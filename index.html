<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>حزب العقوق</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>🏛 حزب العقوق</h1>

<p>الموقع الرسمي للحزب</p>

</header>
<section class="card">

<h2>🚗 لوحة حزب العقوق</h2>

<div class="plate">

<div class="plate-top">
حزب العقوق
</div>

<div class="plate-bottom">

<span id="owner">
أكبر عاق
</span>

<span class="number">
11111
</span>

</div>

</div>

</section>
<main>

<section class="card">

<h2>🪪 طلب الانضمام</h2>

<p>هل ترى أنك تستحق العضوية؟</p>

<button onclick="joinParty()">
انضم الآن
</button>

</section>

<section class="card">

<h2>🏆 رتبتك</h2>

<button onclick="showRank()">
اعرف رتبتك
</button>

</section>

<section class="card">

<h2>📜 دستور الحزب</h2>

<ul>

<li>عدم الرد بسرعة.</li>

<li>القهوة قبل تنفيذ أي طلب.</li>

<li>القيلولة حق دستوري.</li>

<li>الاعتذار اختياري.</li>

</ul>

</section>

</main>

<footer>

جميع الحقوق غير محفوظة 😂

</footer>

<script src="script.js"></script>

</body>

</html>
